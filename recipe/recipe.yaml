context:
  version: "0.19"

package:
  name: otmorris
  version: ${{ version }}

source:
  url: https://github.com/openturns/otmorris/archive/v${{ version }}.tar.gz
  sha256: bb43bfa022c63e2cf6958b0d2f853ebd3ce3748d0019b6502cc8e40203d91d3c

build:
  number: 3
  python:
    version_independent: true

requirements:
  build:
    - cmake
    - swig
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
    - if: unix
      then: make
      else: ninja
    - if: win
      then: m2-diffutils
    - if: build_platform != target_platform
      then:
        - python-abi3 ${{ python_min }}.*
        - python ${{ python_min }}.*
        - cross-python_${{ target_platform }}
  host:
    - python-abi3 ${{ python_min }}.*
    - python ${{ python_min }}.*
    - openturns
  run:
    - python >=${{ python_min }}
  run_exports:
    - ${{ pin_subpackage('otmorris', upper_bound='x.x') }}

tests:
  - python:
      imports:
        - otmorris

about:
  homepage: http://openturns.org/
  license: LGPL-3.0-or-later
  license_family: LGPL
  license_file: COPYING.LESSER
  summary: Morris screening module
  documentation: https://openturns.github.io/otmorris/master/
  repository: https://github.com/openturns/otmorris

extra:
  recipe-maintainers:
    - jschueller
